global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: fraud-detection
    environment: production

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Rule files for alerts
rule_files:
  - "alerts.yml"

scrape_configs:
  # Scrape metrics from Fraud Detection API
  - job_name: 'fraud-detection-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['fraud-api:8000']
        labels:
          service: fraud-detector
          component: inference

  # Scrape system metrics from nodes
  - job_name: 'kubernetes-pods'
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: (.+):(?:\d+);(\d+)
        replacement: $1:$2
        target_label: __address__

  # Scrape MLflow metrics
  - job_name: 'mlflow'
    static_configs:
      - targets: ['mlflow-server:5000']
        labels:
          service: mlflow

  # Scrape Kubernetes metrics
  - job_name: 'kubernetes-nodes'
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)

  # System metrics
  - job_name: 'system-metrics'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: node-exporter