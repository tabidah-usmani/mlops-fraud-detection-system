route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: webhook

receivers:
  - name: webhook
    webhook_configs:
      - url: http://webhook-service:8080/alerts
        send_resolved: true

  - name: slack
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/HERE'
        channel: '#mlops-alerts'
        title: 'Fraud Detection Alert'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'