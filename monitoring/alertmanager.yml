route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'webhook'
  routes:
    - match:
        alertname: ModelRecallDrop
      receiver: 'webhook'
      continue: true
    - match:
        alertname: DataDriftDetected
      receiver: 'webhook'

receivers:
  - name: 'webhook'
    webhook_configs:
      - url: 'http://webhook-receiver:8080/alerts'
        send_resolved: true